name: Release Module

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate tag matches module version
        id: version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MODULE_VERSION="$(python - <<'PY'
          import json
          with open("module.json", encoding="utf-8") as handle:
              print(json.load(handle)["version"])
          PY
          )"

          if [ "$TAG_VERSION" != "$MODULE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match module.json version ($MODULE_VERSION)."
            exit 1
          fi

          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release archive
        run: python tools/build-release.py

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/module.json
            dist/weapon-form-engine-v${{ steps.version.outputs.tag_version }}.zip
